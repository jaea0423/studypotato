<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>공부하는 감자 — 비밀번호 변경</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --knu-blue: #0047BB; --knu-blue-deep: #00347E; --knu-blue-soft: #E5ECF8;
    --knu-orange: #FE5000; --knu-orange-soft: #FFE8DD;
    --cream: #F7F3EC; --paper: #FFFFFF; --paper-warm: #FBF8F2;
    --ink: #1A1A1A; --ink-soft: #555E68; --ink-mute: #8B95A4;
    --line: #E8E2D4; --line-soft: #F0EBDF;
    --error: #DC3545; --success: #2D7A3E;
    --font-kr: 'Pretendard Variable', Pretendard, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius-s: 10px; --radius-m: 16px; --radius-l: 22px;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  button{ background:none; border:none; cursor:pointer; font-family: inherit; }
  body{ font-family: var(--font-kr); background: var(--line); color: var(--ink); overflow-x: hidden; word-break: keep-all; line-height: 1.5; }
  .app{ max-width: 480px; margin: 0 auto; background: var(--cream); min-height: 100vh; padding-bottom: 100px; position: relative; }

  .topbar{
    display: flex; align-items: center; gap: 8px;
    padding: 14px 20px 16px;
    background: var(--cream);
    position: sticky; top: 0; z-index: 10;
    border-bottom: 1px solid var(--line-soft);
  }
  .back-btn{
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
  }
  .back-btn:active{ background: var(--line-soft); }
  .top-title{ font-size: 16px; font-weight: 800; flex: 1; }

  /* 페이지 헤더 */
  .page-head{
    padding: 22px 24px 8px;
  }
  .page-head h1{
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .page-head h1 em{
    font-style: normal;
    color: var(--knu-orange);
  }
  .page-head .sub{
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* 안내 박스 */
  .info-box{
    margin: 16px 24px 0;
    padding: 12px 14px;
    background: var(--knu-blue-soft);
    border-left: 3px solid var(--knu-blue);
    border-radius: var(--radius-s);
    font-size: 12px;
    color: var(--knu-blue);
    line-height: 1.6;
  }
  .info-box strong{ font-weight: 700; }

  /* 폼 블록 */
  .form-block{ padding: 22px 24px 4px; }
  .form-label-row{
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .form-label{
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink);
  }
  .form-sub{
    font-size: 12px;
    color: var(--ink-mute);
    margin-bottom: 14px;
    line-height: 1.55;
    padding-left: 2px;
  }

  /* PIN 입력 — 6자리 한 줄에 정사각형으로 안정적으로 들어가도록 */
  .pin-row{
    display: flex;
    gap: 6px;
    width: 100%;
    margin: 0 auto;
  }
  .pin-cell{
    flex: 1 1 0;
    min-width: 0;
    aspect-ratio: 1 / 1;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-s);
    color: var(--ink);
    font-family: var(--font-mono);
    outline: none;
    transition: all 0.15s;
    -webkit-text-security: disc;
    padding: 0;
  }
  .pin-cell:focus{
    border-color: var(--knu-blue);
    box-shadow: 0 0 0 3px rgba(0,71,187,0.08);
  }
  .pin-cell.filled{
    background: var(--knu-blue-soft);
    border-color: var(--knu-blue);
  }
  .pin-cell.error{
    background: #FCE8EA;
    border-color: var(--error);
    color: var(--error);
    animation: shake 0.4s;
  }
  .pin-cell.success{
    background: #E0F0E4;
    border-color: var(--success);
  }
  @keyframes shake{
    0%, 100%{ transform: translateX(0); }
    25%{ transform: translateX(-4px); }
    75%{ transform: translateX(4px); }
  }
  .pin-hint{
    margin-top: 10px;
    font-size: 12px;
    color: var(--ink-mute);
    text-align: center;
    line-height: 1.5;
  }
  .pin-hint.error{ color: var(--error); font-weight: 600; }
  .pin-hint.success{ color: var(--success); font-weight: 600; }

  /* 비밀번호 찾기 링크 */
  .forgot-link{
    display: block;
    margin: 20px auto 0;
    background: transparent;
    color: var(--ink-mute);
    font-size: 12px;
    font-weight: 500;
    text-decoration: underline;
    padding: 8px;
  }

  /* 하단 고정 버튼 */
  .bottom-bar{
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    pointer-events: none;
  }
  .bottom-inner{
    max-width: 480px;
    margin: 0 auto;
    padding: 12px 24px 18px;
    background: linear-gradient(to top, var(--cream) 70%, transparent);
    pointer-events: auto;
  }
  .btn-primary{
    width: 100%;
    background: var(--knu-orange);
    color: white;
    padding: 14px;
    border-radius: var(--radius-s);
    font-size: 14px;
    font-weight: 700;
    transition: all 0.15s;
  }
  .btn-primary:active{ transform: scale(0.99); background: #CC4000; }
  .btn-primary:disabled{
    background: var(--line);
    color: var(--ink-mute);
    cursor: not-allowed;
  }

  /* 완료 화면 */
  .success-screen{
    display: none;
    padding: 60px 24px 24px;
    text-align: center;
  }
  .success-screen.show{ display: block; }
  .success-emoji{ font-size: 56px; margin-bottom: 16px; }
  .success-title{
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .success-sub{
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 30px;
  }

  /* 토스트 */
  .toast{
    position: fixed; bottom: 84px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--ink); color: var(--cream);
    padding: 11px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: all 0.25s; z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">

  <!-- 상단 바 -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()" aria-label="뒤로가기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="top-title">비밀번호 변경</div>
  </div>

  <!-- 메인 화면 -->
  <div id="main-screen">

    <!-- 페이지 헤더 -->
    <div class="page-head">
      <h1>비밀번호 <em>변경</em></h1>
      <div class="sub">6자리 숫자로 다시 설정해주세요.</div>
    </div>

    <!-- 안내 -->
    <div class="info-box">
      💡 <strong>5회 연속 틀리면</strong> 계정이 잠겨요. 메일 인증으로만 풀 수 있어요.
    </div>

    <!-- 1. 현재 비밀번호 -->
    <div class="form-block">
      <div class="form-label-row">
        <span class="form-label">현재 비밀번호</span>
      </div>
      <div class="form-sub">지금 사용 중인 6자리 숫자를 입력해주세요.</div>
      <div class="pin-row" data-pin="current">
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
      </div>
      <div class="pin-hint" id="current-hint">남은 시도 <strong id="attempts">5</strong>회</div>
    </div>

    <!-- 2. 새 비밀번호 -->
    <div class="form-block">
      <div class="form-label-row">
        <span class="form-label">새 비밀번호</span>
      </div>
      <div class="form-sub">현재 비밀번호와 다른 6자리 숫자.</div>
      <div class="pin-row" data-pin="new">
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
      </div>
      <div class="pin-hint" id="new-hint">6자리 숫자로 입력해주세요</div>
    </div>

    <!-- 3. 새 비밀번호 확인 -->
    <div class="form-block">
      <div class="form-label-row">
        <span class="form-label">새 비밀번호 확인</span>
      </div>
      <div class="form-sub">위에 입력한 번호를 한 번 더 입력해주세요.</div>
      <div class="pin-row" data-pin="confirm">
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
        <input class="pin-cell" type="password" inputmode="numeric" maxlength="1" />
      </div>
      <div class="pin-hint" id="confirm-hint">두 번 같은 값을 입력하면 일치 확인이 나와요</div>
    </div>

    <button class="forgot-link" onclick="showToast('비밀번호 재설정 메일을 보내드릴게요')">
      현재 비밀번호가 기억나지 않으세요?
    </button>

  </div>

  <!-- 완료 화면 -->
  <div class="success-screen" id="success-screen">
    <div class="success-emoji">🥔</div>
    <h2 class="success-title">변경 완료!</h2>
    <p class="success-sub">
      다음 로그인부터 새 비밀번호를 사용하시면 돼요.<br>
      잊지 않도록 잘 기억해주세요.
    </p>
  </div>

</div>

<!-- 하단 고정 버튼 -->
<div class="bottom-bar" id="bottom-bar">
  <div class="bottom-inner">
    <button class="btn-primary" id="submit-btn" disabled onclick="submitChange()">변경하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ============================================================
     PIN 입력 (3 그룹: 현재 / 새 / 확인)
     ============================================================ */
  // 데모: 현재 비밀번호는 '123456'으로 가정
  const CURRENT_PASSWORD = '123456';
  let attemptsLeft = 5;

  const pinGroups = ['current', 'new', 'confirm'];

  function setupPinGroup(name){
    const row = document.querySelector(`[data-pin="${name}"]`);
    const cells = row.querySelectorAll('.pin-cell');
    cells.forEach((cell, idx) => {
      cell.addEventListener('input', e => {
        const v = e.target.value;
        if(!/^\d?$/.test(v)){
          e.target.value = '';
          return;
        }
        if(v){
          cell.classList.add('filled');
          if(idx < cells.length - 1) cells[idx + 1].focus();
        } else {
          cell.classList.remove('filled');
        }
        validate();
      });
      cell.addEventListener('keydown', e => {
        if(e.key === 'Backspace' && !cell.value && idx > 0){
          cells[idx - 1].focus();
          cells[idx - 1].value = '';
          cells[idx - 1].classList.remove('filled');
          validate();
        }
      });
      cell.addEventListener('focus', () => {
        cell.select && cell.select();
      });
    });
  }

  function readPin(name){
    const row = document.querySelector(`[data-pin="${name}"]`);
    return Array.from(row.querySelectorAll('.pin-cell')).map(c => c.value).join('');
  }

  function clearPin(name){
    const row = document.querySelector(`[data-pin="${name}"]`);
    row.querySelectorAll('.pin-cell').forEach(c => {
      c.value = '';
      c.classList.remove('filled', 'error', 'success');
    });
  }

  function setPinState(name, state){
    const row = document.querySelector(`[data-pin="${name}"]`);
    row.querySelectorAll('.pin-cell').forEach(c => {
      c.classList.remove('error', 'success');
      if(state) c.classList.add(state);
    });
  }

  /* ============================================================
     검증
     ============================================================ */
  function validate(){
    const cur = readPin('current');
    const nw = readPin('new');
    const cf = readPin('confirm');
    const submitBtn = document.getElementById('submit-btn');

    // 현재 비밀번호 힌트
    const curHint = document.getElementById('current-hint');
    if(cur.length === 6){
      // 일치 검사는 변경 버튼 누를 때만 — 미리 알려주면 무차별 추측 도움
      curHint.innerHTML = `남은 시도 <strong>${attemptsLeft}</strong>회`;
      curHint.className = 'pin-hint';
    } else {
      curHint.innerHTML = `남은 시도 <strong>${attemptsLeft}</strong>회`;
      curHint.className = 'pin-hint';
    }

    // 새 비밀번호 힌트
    const newHint = document.getElementById('new-hint');
    if(nw.length === 6){
      if(nw === cur && cur.length === 6){
        newHint.textContent = '현재 비밀번호와 다른 번호를 입력해주세요';
        newHint.className = 'pin-hint error';
      } else {
        newHint.textContent = '좋아요. 6자리 입력 완료';
        newHint.className = 'pin-hint success';
      }
    } else {
      newHint.textContent = '6자리 숫자로 입력해주세요';
      newHint.className = 'pin-hint';
    }

    // 확인 힌트
    const cfHint = document.getElementById('confirm-hint');
    if(cf.length === 6){
      if(cf === nw){
        cfHint.textContent = '일치해요';
        cfHint.className = 'pin-hint success';
        setPinState('confirm', 'success');
      } else {
        cfHint.textContent = '새 비밀번호와 다른 값이에요';
        cfHint.className = 'pin-hint error';
        setPinState('confirm', null);
      }
    } else {
      cfHint.textContent = '두 번 같은 값을 입력하면 일치 확인이 나와요';
      cfHint.className = 'pin-hint';
      setPinState('confirm', null);
    }

    // 제출 가능 조건
    const ok = cur.length === 6 && nw.length === 6 && cf.length === 6
            && nw === cf && nw !== cur && attemptsLeft > 0;
    submitBtn.disabled = !ok;
  }

  /* ============================================================
     변경 제출 (현재 비밀번호 일치 확인은 여기서)
     ============================================================ */
  function submitChange(){
    const cur = readPin('current');
    const nw = readPin('new');

    if(cur !== CURRENT_PASSWORD){
      attemptsLeft--;
      setPinState('current', 'error');
      const curHint = document.getElementById('current-hint');

      if(attemptsLeft <= 0){
        curHint.textContent = '5회 모두 틀렸어요. 메일 인증으로 잠금을 풀어주세요.';
        curHint.className = 'pin-hint error';
        document.getElementById('submit-btn').disabled = true;
      } else {
        curHint.innerHTML = `현재 비밀번호가 틀렸어요. 남은 시도 <strong>${attemptsLeft}</strong>회`;
        curHint.className = 'pin-hint error';
      }
      // 0.5초 후 에러 상태 해제 (다시 입력 가능)
      setTimeout(() => {
        clearPin('current');
        document.querySelector('[data-pin="current"] .pin-cell').focus();
        validate();
      }, 800);
      return;
    }

    // 성공 — 완료 화면 표시
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
    const btn = document.getElementById('submit-btn');
    btn.textContent = '대시보드로 이동';
    btn.disabled = false;
    btn.onclick = () => { window.location.href = 'dashboard.html'; };
  }

  /* ============================================================
     토스트
     ============================================================ */
  let toastTimer = null;
  function showToast(message){
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  /* ============================================================
     초기화
     ============================================================ */
  document.addEventListener('DOMContentLoaded', () => {
    pinGroups.forEach(setupPinGroup);
    document.querySelector('[data-pin="current"] .pin-cell').focus();
  });
</script>
</body>
</html>
