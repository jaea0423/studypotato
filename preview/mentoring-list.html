<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>공부하는 감자 — 감자사이</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥔</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<style>
  body { visibility: hidden; }
  body.ready { visibility: visible; }
</style>
<style>
  :root{
    --knu-blue:#0047BB; --knu-blue-deep:#00347E; --knu-blue-soft:#E5ECF8;
    --knu-orange:#FE5000; --knu-orange-soft:#FFE8DD;
    --cream:#F7F3EC; --paper:#FFFFFF; --paper-warm:#FBF8F2;
    --ink:#1A1A1A; --ink-soft:#555E68; --ink-mute:#8B95A4;
    --line:#E8E2D4; --line-soft:#F0EBDF;
    --error:#DC3545; --success:#2D7A3E;
    --mentor-green:#16A34A; --mentor-green-soft:#DCFCE7;
    --font-kr:'Pretendard Variable',Pretendard,sans-serif;
    --font-mono:'JetBrains Mono',monospace;
    --radius-s:10px; --radius-m:16px; --radius-l:22px;
  }
  *{margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{overflow-x:hidden; max-width:100%; width:100%;}
  body{font-family:var(--font-kr); background:var(--paper-warm); color:var(--ink); line-height:1.5; word-break:keep-all;}
  button{font-family:inherit; cursor:pointer; border:0; background:none; color:inherit;}
  input,textarea{font-family:inherit; color:inherit; border:0; outline:none; background:none;}
  .app{max-width:480px; min-height:100vh; margin:0 auto; background:var(--cream); padding-bottom:100px;}
  @media(min-width:481px){body{background:#E8E2D4;}}

  .topbar{display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--cream); position:sticky; top:0; z-index:10; border-bottom:1px solid var(--line-soft);}
  .back-btn{width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--ink-soft);}
  .back-btn:active{background:var(--line-soft);}
  .topbar-title{font-size:16px; font-weight:800; flex:1;}

  .hero{background: linear-gradient(135deg, var(--mentor-green) 0%, #22C55E 100%); color:white; padding:24px 24px 28px; border-bottom-left-radius:24px; border-bottom-right-radius:24px;}
  .hero .badge{display:inline-block; background:rgba(255,255,255,0.22); padding:4px 12px; border-radius:999px; font-size:11px; font-weight:700; font-family:var(--font-mono); margin-bottom:12px;}
  .hero h1{font-size:26px; font-weight:800; letter-spacing:-0.02em; margin-bottom:8px;}
  .hero p{font-size:13px; opacity:0.95; line-height:1.55;}

  .coming-soon{margin:16px 20px 0; background:var(--knu-orange-soft); color:#8B4500; border-radius:var(--radius-m); padding:12px 14px; font-size:12px; line-height:1.6;}
  .coming-soon strong{font-weight:700;}

  .filter-bar{padding:14px 20px 0; display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .filter-chip{flex-shrink:0; background:var(--paper); border:1.5px solid var(--line); padding:8px 14px; border-radius:999px; font-size:13px; font-weight:600; color:var(--ink-soft); white-space:nowrap;}
  .filter-chip.active{background:var(--mentor-green); color:white; border-color:var(--mentor-green);}

  .list-section{padding:14px 20px 0;}
  .section-title{font-size:13px; font-weight:700; color:var(--ink-soft); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;}
  .section-title .count{font-family:var(--font-mono); font-size:11px; color:var(--ink-mute);}

  .ment-card{background:var(--paper); border:1px solid var(--line); border-radius:var(--radius-m); padding:16px; margin-bottom:10px; cursor:pointer; transition:border-color 0.15s;}
  .ment-card:active{border-color:var(--mentor-green);}
  .ment-card .head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; gap:8px;}
  .ment-card .cat-tag{background:var(--mentor-green-soft); color:var(--mentor-green); font-size:11px; font-weight:700; padding:3px 8px; border-radius:999px;}
  /* 모집 인원 표기 — 기본 주황. .hot 이면 빨강(가득 차거나 초과 = 핫한 멘토링) */
  .ment-card .recruit-wrap{display:flex; flex-direction:column; align-items:flex-end; gap:2px;}
  .ment-card .recruiting{font-size:11px; color:var(--knu-orange); font-weight:700; font-family:var(--font-mono);}
  .ment-card .recruiting.hot{color:var(--error);}
  .ment-card .deadline-soon{font-size:10px; color:var(--error); font-weight:700; font-family:var(--font-mono);}
  .ment-card .subject{font-size:16px; font-weight:800; margin-bottom:6px; letter-spacing:-0.02em;}
  .ment-card .intro{font-size:13px; color:var(--ink-soft); line-height:1.55; margin-bottom:10px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
  .ment-card .meta{display:flex; flex-wrap:wrap; gap:6px; font-size:11px; color:var(--ink-mute); font-family:var(--font-mono);}
  .ment-card .meta .item{background:var(--paper-warm); padding:3px 8px; border-radius:6px;}
  .ment-card .foot{display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid var(--line-soft);}
  .ment-card .mentor{font-size:12px; font-weight:600; color:var(--ink);}
  .ment-card .mentor .role{color:var(--mentor-green); font-size:10px; margin-right:4px; font-family:var(--font-mono); font-weight:700;}
  .ment-card .dday{font-size:11px; color:var(--ink-mute); font-family:var(--font-mono);}

  .empty{text-align:center; padding:60px 24px; color:var(--ink-mute); font-size:13px;}
  .empty .emoji{font-size:48px; margin-bottom:16px;}

  /* FAB — 멘토 등록 */
  .fab{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); width:100%; max-width:440px; background:var(--mentor-green); color:white; padding:16px; border-radius:var(--radius-l); font-size:15px; font-weight:700; box-shadow:0 6px 20px rgba(22,163,74,0.35); z-index:50;}
  .fab:active{transform:translateX(-50%) scale(0.98);}

  /* 안내 박스 (가입 안내 — 멘토용) */
  .info-call{background:var(--mentor-green-soft); color:var(--mentor-green); border-radius:var(--radius-m); padding:14px 16px; font-size:12px; line-height:1.6; margin:14px 20px 0;}
  .info-call strong{font-weight:700;}
</style>
</head>
<body>

<div class="app">

  <div class="topbar">
    <button class="back-btn" onclick="location.href='dashboard.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="topbar-title">감자사이</div>
  </div>

  <!-- 히어로 -->
  <div class="hero">
    <span class="badge">🚧 COMING SOON</span>
    <h1>선배에게 묻고, 후배를 돕는<br>감자사이</h1>
    <p>같은 강원대 선후배끼리 1대1~3 멘토링.<br>조건 충족 멘티만 지원 가능 · 모집 마감 후 랜덤 추첨.</p>
  </div>

  <!-- 커밍순 안내 -->
  <div class="coming-soon">
    🚧 <strong>아직 정식 오픈 전이에요.</strong> 정식 출시 후 본격 운영됩니다. (출시 알림 받기는 곧 안내 예정)<br>
    지금은 화면 미리보기 / 개발용으로 둘러보실 수 있어요.
  </div>

  <!-- 멘토 안내 -->
  <div class="info-call">
    🎁 <strong>멘토 활동 시 혜택</strong>: 활동 인증서 PDF 발급 · 본인 활동 통계 · 운영자 감사 메일 · 멘티가 음료 사드리는 문화 (자율)
  </div>

  <!-- 카테고리 필터 -->
  <div class="filter-bar">
    <button class="filter-chip active" onclick="filterCat(this, 'all')">전체</button>
    <button class="filter-chip" onclick="filterCat(this, 'major')">📚 전공</button>
    <button class="filter-chip" onclick="filterCat(this, 'language')">🌏 어학</button>
    <button class="filter-chip" onclick="filterCat(this, 'cert')">📜 자격증</button>
    <button class="filter-chip" onclick="filterCat(this, 'career')">💼 취업·진로</button>
    <button class="filter-chip" onclick="filterCat(this, 'etc')">✨ 기타</button>
  </div>

  <!-- 멘토링 카드 목록 -->
  <div class="list-section">
    <div class="section-title">
      <span>모집 중인 멘토링</span>
      <span class="count" id="card-count">— 건</span>
    </div>
    <div id="ment-list"></div>
  </div>

</div>

<button class="fab" onclick="location.href='mentoring-create.html'">+ 멘토로 등록하기</button>

<script>
  /* Supabase 인증 가드 (로그인 필요) */
  let supabaseClient = null;
  const SUPABASE_URL='https://mleypjquzggtyouepfha.supabase.co';
  const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sZXlwanF1emdndHlvdWVwZmhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MTAzMDIsImV4cCI6MjA5NDM4NjMwMn0.eM4nh50tC-ZxVRoIA1NZit4JtMJqPlUBZ5LEnTrRB5Q';
  try{ supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }catch(e){}
  (async function(){
    if(!supabaseClient){ document.body.classList.add('ready'); return; }
    const { data: { session } } = await supabaseClient.auth.getSession();
    if(!session){ location.replace('auth.html'); return; }
    document.body.classList.add('ready');
  })();

  /* ====== 더미 멘토링 카드 데이터 ====== */
  const DUMMY = [
    { id:1, cat:'major', catLabel:'📚 전공', subject:'자료구조 트리·그래프 정복',
      intro:'학기 중간고사 끝나고 트리/그래프 막힌 후배 도와줘요. 백준 같이 풀고 직접 코드 짜보는 방식.',
      capacity:2, applied:1, condGrade:'1~2학년', condCollege:'공과대학',
      period:'4주', form:'단기', closesIn:5, mentor:'씩씩한감자', mentorInfo:'3학년·컴공' },
    { id:2, cat:'career', catLabel:'💼 취업·진로', subject:'IT 대기업 자소서 첨삭',
      intro:'카카오·네이버 합격 자소서 보유. 자소서 1편 같이 첨삭. 면접 팁도 공유.',
      capacity:3, applied:5, condGrade:'3~4학년', condCollege:'무관',
      period:'1회성', form:'1회 만남', closesIn:2, mentor:'똘똘한고구마', mentorInfo:'4학년·경영' },
    { id:3, cat:'language', catLabel:'🌏 어학', subject:'토익 900 만들기',
      intro:'토익 935 보유. LC 만점 비결 + RC 단기 끌어올리는 법 알려드려요.',
      capacity:2, applied:2, condGrade:'무관', condCollege:'무관',
      period:'3주', form:'단기 시리즈', closesIn:7, mentor:'귀여운대파', mentorInfo:'4학년·인문' },
    { id:4, cat:'cert', catLabel:'📜 자격증', subject:'정보처리기사 실기 합격 노하우',
      intro:'올해 1회차 합격. 실기 시험 패턴/암기법/시간 관리. 같이 문제집 풀어요.',
      capacity:1, applied:0, condGrade:'2~4학년', condCollege:'공과대학',
      period:'4주', form:'단기 시리즈', closesIn:10, mentor:'졸린양파', mentorInfo:'3학년·컴공' },
    { id:5, cat:'etc', catLabel:'✨ 기타', subject:'춘천 자취 정착 도와드림',
      intro:'타지에서 와서 자취 시작하는 후배. 동네 추천, 자취 팁, 학교생활 적응 도와요.',
      capacity:3, applied:1, condGrade:'1학년', condCollege:'무관',
      period:'1회성', form:'1회 만남', closesIn:14, mentor:'활발한브로콜리', mentorInfo:'2학년·자연과학' }
  ];

  let currentFilter = 'all';

  function renderList(){
    const list = currentFilter === 'all' ? DUMMY : DUMMY.filter(c => c.cat === currentFilter);
    document.getElementById('card-count').textContent = `${list.length} 건`;
    const el = document.getElementById('ment-list');
    if(list.length === 0){
      el.innerHTML = `<div class="empty"><div class="emoji">🤷</div>이 분야에는 모집 중인 멘토링이 없어요.</div>`;
      return;
    }
    el.innerHTML = list.map(c => {
      // 인원이 가득 차거나 초과 = 핫한 멘토링 (빨강), 아직 모집 가능
      const hot = c.applied >= c.capacity;
      // 마감 임박: D-3 이하 (= closesIn <= 3)
      const deadlineSoon = c.closesIn <= 3;
      return `
        <div class="ment-card" onclick="location.href='mentoring-detail.html?id=${c.id}'">
          <div class="head">
            <span class="cat-tag">${c.catLabel}</span>
            <div class="recruit-wrap">
              <span class="recruiting ${hot ? 'hot' : ''}">${c.applied} / ${c.capacity}명 모집 중</span>
              ${deadlineSoon ? '<span class="deadline-soon">⏰ 마감 임박</span>' : ''}
            </div>
          </div>
          <div class="subject">${c.subject}</div>
          <div class="intro">${c.intro}</div>
          <div class="meta">
            <span class="item">${c.condGrade}</span>
            <span class="item">${c.condCollege}</span>
            <span class="item">${c.period}</span>
            <span class="item">${c.form}</span>
          </div>
          <div class="foot">
            <div class="mentor"><span class="role">MENTOR</span>${c.mentor} · ${c.mentorInfo}</div>
            <div class="dday">D-${c.closesIn}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterCat(btn, cat){
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = cat;
    renderList();
  }

  renderList();
</script>
</body>
</html>
